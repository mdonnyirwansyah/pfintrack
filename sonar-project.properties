sonar.projectKey=pfintrack
sonar.projectName=PFinTrack
sonar.projectVersion=1.0.0

sonar.host.url=http://localhost:9001

# ── Sources ──────────────────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=tests

# ── Language ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
sonar.javascript.environments=browser

# TypeScript config untuk resolusi path alias @/*
sonar.typescript.tsconfigPath=tsconfig.json

# ── Exclusions ───────────────────────────────────────────────────────────────
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  public/**,\
  src/components/ui/**,\
  **/*.d.ts

sonar.test.inclusions=\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.test.ts,\
  **/*.test.tsx,\
  tests/**/*.ts,\
  tests/**/*.js,\
  tests/**/*.mjs

# File yg tidak relevan di-exclude dari duplikasi & metrik
# Form components punya pola amount formatting yang identik by design
sonar.cpd.exclusions=\
  src/lib/types/**,\
  messages/**,\
  src/app/transactions/_components/IncomeExpenseForm.tsx,\
  src/app/transactions/_components/TransferForm.tsx,\
  src/components/loan/LoanEntryForm.tsx,\
  src/features/wallet/components/WalletForm.tsx

# ── Coverage ─────────────────────────────────────────────────────────────────
# Project ini pakai Playwright e2e, bukan unit test — exclude semua dari coverage
sonar.coverage.exclusions=**/*

# ── Quality Gate ─────────────────────────────────────────────────────────────
# Fokus analisis pada new code saja (sejak branch ini)
sonar.newCode.referenceBranch=main
