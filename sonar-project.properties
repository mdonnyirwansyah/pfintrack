sonar.projectKey=pfintrack
sonar.projectName=pfintrack

sonar.host.url=http://localhost:9001

# Sources — all hand-written code under src/
sonar.sources=src

# Exclude generated, third-party, and non-application directories
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  public/**,\
  src/components/ui/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/__tests__/**

# Test files (map separately so coverage is attributed correctly)
sonar.tests=src
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/__tests__/**

# Coverage report (generated by vitest/jest with --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.sourceEncoding=UTF-8
